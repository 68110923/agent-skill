<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill - Agent & Skill</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Skill</h1>
      <p>按场景分类的精选 Skill，覆盖通用、逆向、大项目、数据库等</p>
    </div>
    <nav class="nav">
      <a href="index.html">🏠 总览</a>
      <a href="agent.html">🤖 Agent 框架</a>
      <a href="tools.html">🔧 工具</a>
      <a href="skills.html" class="active">⚡ Skill</a>
    </nav>
    <div id="error-msg" class="error"></div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>场景</th><th>名称</th><th>说明</th></tr></thead>
        <tbody id="table-body">
          <tr><td colspan="99" class="loading">正在加载</td></tr>
        </tbody>
      </table>
    </div>
    <div class="footer">
      数据实时从 <a href="https://raw.githubusercontent.com/68110923/agent-skill/main/README.md">README.md</a> 获取 · 修改 README 刷新即同步
    </div>
  </div>
  <script src="app.js"></script>
  <script>
    async function init() {
      const tbody = document.getElementById('table-body');
      const tables = await loadData();
      const table = tables.find(t => t.section.startsWith('Skill'));
      tbody.innerHTML = table && table.rows.length
        ? renderTable(table.rows, 1)
        : '<tr><td colspan="99" class="empty">未找到数据</td></tr>';
    }
    init();
  </script>
</body>
</html>
