<!DOCTYPE html>
<html lang="zh-CN" data-page="Skill|Skill">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill - Agent & Skill</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container" id="root">
    <script src="app.js"></script>
    <script>
      injectLayout('Skill', '按场景分类的精选 Skill，覆盖通用、逆向、大项目、数据库等');
      document.getElementById('table-head').innerHTML =
        '<tr><th>场景</th><th>名称</th><th>说明</th></tr>';
      loadData().then(tables => {
        const t = tables.find(t => t.section.startsWith('Skill'));
        document.getElementById('table-body').innerHTML =
          t && t.rows.length ? renderTable(t.header, t.rows, 1)
          : '<tr><td colspan="99" class="empty">未找到数据</td></tr>';
      });
    </script>
  </div>
</body>
</html>
