name: Generate Pages

on:
  push:
    branches: [main]
    paths: ['README.md']

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/generate-pages.js
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'auto: sync GitHub Pages from README'
          file_pattern: docs/*.html
